<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>AI Quiz Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<nav class="navbar">
<div class="container">
<span class="navbar-brand title-gradient">AI Quiz Generator</span>
</div>
</nav>

<section class="hero-section">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card app-card">

{% if message %}
<div class="alert alert-info">
{{ message }}
</div>
{% endif %}

{% if login_required %}

<!-- LOGIN FORM -->

<div id="login-form">

<h3 class="title">Student Login</h3>

<form action="/login" method="POST">

<input type="email" name="email" class="form-control mb-3" placeholder="Email" required>

<input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn btn-primary w-100">Login</button>

</form>

<p class="text-center mt-3">

New user? 
<a href="#" onclick="showRegister()">Register</a>

</p>

</div>


<!-- REGISTER FORM -->

<div id="register-form" style="display:none;">

<h3 class="title">User Registration</h3>

<form action="/register" method="POST">

<input type="email" name="email" class="form-control mb-3" placeholder="Email" required>

<input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn btn-primary w-100">Register</button>

</form>

<p class="text-center mt-3">

Already registered? 
<a href="#" onclick="showLogin()">Login</a>

</p>

</div>

{% else %}

<h2 class="title">Create Your AI Quiz</h2>

<form action="/generate" method="POST">

<div class="mb-4">

<label class="form-label"><b>Quiz Topic</b></label>

<input type="text" name="topic" class="form-control" required>

</div>

<div class="mb-4">

<label class="form-label"><b>Number of Questions</b></label>

<input type="number" name="num_questions" class="form-control" required>

</div>

<button class="btn btn-primary w-100 btn-lg">
Generate Quiz
</button>

</form>

<a href="/logout" class="btn btn-outline-dark w-100 mt-3">
Logout
</a>

{% endif %}

</div>

</div>

</div>

</div>

</section>

<script>

function showRegister(){
document.getElementById("login-form").style.display="none";
document.getElementById("register-form").style.display="block";
}

function showLogin(){
document.getElementById("register-form").style.display="none";
document.getElementById("login-form").style.display="block";
}

</script>

</body>
</html>
