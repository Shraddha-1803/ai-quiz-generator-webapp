<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

.quiz-container{
animation: fadeSlide 0.5s ease;
}

@keyframes fadeSlide{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.correct{
background:#22c55e;
color:white;
padding:6px;
border-radius:6px;
}

.wrong{
background:#ef4444;
color:white;
padding:6px;
border-radius:6px;
}

.progress{
height:12px;
border-radius:20px;
overflow:hidden;
}

.progress-bar{
transition:width 0.5s ease;
}

</style>

</head>

<body>

<nav class="navbar">
<div class="container">
<span class="navbar-brand title-gradient">AI Quiz Generator</span>
</div>
</nav>

<div class="container mt-5">

{% if finished %}

<div class="quiz-container text-center">

<h2>Quiz Completed 🎉</h2>

<h3>Your Score</h3>

<h1>{{ score }} / {{ total }}</h1>

<a href="/" class="btn btn-primary mt-4">
Generate New Quiz
</a>

</div>

{% else %}

<div class="quiz-container">

<h5>Question {{ qno }} / {{ total }}</h5>

<!-- PROGRESS BAR -->
<div class="progress mt-2 mb-4">
<div class="progress-bar bg-success"  style="width: '{{ progress }}%';">
</div>
</div>

<div class="timer">
⏳ Time left: <span id="time">120</span> sec
</div>

<h4 class="mt-4">{{ question.question }}</h4>

<form method="POST" id="quiz-form">
<input type="hidden" name="answer" id="hidden-answer">

{% for key, value in question.options.items() %}

<div class="form-check mt-3 option-box" data-key="{{key}}">

<input class="form-check-input option-input"
type="radio"
name="answer"
value="{{key}}"
required>

<label class="form-check-label">
<strong>{{key}}</strong> {{value}}
</label>

</div>

{% endfor %}

<button type="button" class="btn btn-primary mt-4" id="submit-btn">
Submit Answer
</button>

<button type="submit" class="btn btn-success mt-4 d-none" id="next-btn">
Next Question →
</button>

</form>

</div>

{% endif %}

</div>

<script>

let correctAnswer = "{{ correct_answer }}";
let submitted = false;

let options = document.querySelectorAll(".option-box");
let inputs = document.querySelectorAll(".option-input");

const submitBtn = document.getElementById("submit-btn");
const nextBtn = document.getElementById("next-btn");

/* ---------- SUBMIT BUTTON ---------- */

if(submitBtn){

submitBtn.addEventListener("click", function(){

let selectedInput = document.querySelector('input[name="answer"]:checked');

if(!selectedInput){
alert("Please select an answer.");
return;
}

submitted = true;

let selected = selectedInput.value;
document.getElementById("hidden-answer").value = selected;

options.forEach(option => {

let key = option.dataset.key;

if(key === correctAnswer){
option.classList.add("correct");
}

if(key === selected && key !== correctAnswer){
option.classList.add("wrong");
}

});

/* LOCK OPTIONS */

inputs.forEach(input=>{
input.disabled = true;
});

/* BUTTON SWITCH */

submitBtn.classList.add("d-none");
nextBtn.classList.remove("d-none");

});

}

/* ---------- TIMER ---------- */

let time = 120;

const timer = document.getElementById("time");

function formatTime(seconds){

let minutes = Math.floor(seconds / 60);
let secs = seconds % 60;

if(secs < 10){
secs = "0" + secs;
}

return minutes + ":" + secs;
}

if(timer){

timer.innerText = formatTime(time);

setInterval(function(){

time--;

timer.innerText = formatTime(time);

if(time <= 0){

document.getElementById("quiz-form").submit();

}

},1000);

}

</script>

</body>
</html>
